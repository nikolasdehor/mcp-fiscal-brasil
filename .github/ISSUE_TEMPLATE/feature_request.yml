name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature you'd like to see.
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module would this feature belong to?
      options:
        - cnpj
        - nfe
        - nfse
        - sped
        - esocial
        - new module
        - core/server
        - other
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the use case — what problem does this solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about?
