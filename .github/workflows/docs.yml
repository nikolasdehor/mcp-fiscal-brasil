name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "CHANGELOG.md"
      - "src/mcp_fiscal_brasil/**/*.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: docs-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          pip install \
            mkdocs-material \
            mkdocs-mermaid2-plugin \
            "mkdocstrings[python]" \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-gen-files \
            mkdocs-literate-nav \
            pymdown-extensions
          pip install -e .

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
